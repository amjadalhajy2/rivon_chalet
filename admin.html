<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="shortcut icon" href="./logo.png">
  <link rel="apple-touch-icon" href="./logo.png">

  <title>لوحة مدير الحجوزات - شاليهات رافانا</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/locales/ar.global.min.js" defer></script>

  <style>
    :root {
      --surface: rgba(255,255,255,0.80);
      --surface-2: rgba(255,255,255,0.90);
      --line: rgba(77, 58, 34, 0.10);
      --line-strong: rgba(95, 70, 48, 0.16);
      --text: #2c2218;
      --muted: #76695a;
      --brand: #8b6a48;
      --brand-dark: #5f4630;
      --success: #24a46d;
      --danger: #d45454;
      --warning: #e3a12b;
      --shadow-xl: 0 24px 60px rgba(66, 43, 19, 0.10);
      --shadow-md: 0 10px 22px rgba(66, 43, 19, 0.08);
      --header-h: 78px;
      --radius-2xl: 34px;
      --radius-xl: 28px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      font-family: "Tajawal", "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(250,248,244,0.78), rgba(245,242,236,0.82)),
        url('images/background-main.jpg') center center / cover no-repeat;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      padding-top: var(--header-h);
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.16;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(139,106,72,0.035) 0px,
          rgba(139,106,72,0.035) 1px,
          transparent 1px,
          transparent 28px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(95,70,48,0.025) 0px,
          rgba(95,70,48,0.025) 1px,
          transparent 1px,
          transparent 28px
        );
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    body.menu-open {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    .container {
      width: min(1180px, calc(100% - 20px));
      margin: 0 auto;
    }

    .topbar {
      position: fixed;
      top: 0;
      inset-inline: 0;
      z-index: 2000;
      width: 100%;
    }

    .topbar-inner {
      width: 100%;
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      border-bottom: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow-md);
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo-box {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fff, #f2ebe3);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      width: 48px;
      min-width: 48px;
      height: 48px;
      min-height: 48px;
      padding: 0;
      background: linear-gradient(180deg, #fff, #f6f0e8);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      border-radius: 999px;
      border: 0;
      outline: none;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(95, 70, 48, 0.10);
    }

    .menu-btn span {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: var(--text);
    }

    .side-menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 2090;
      background: rgba(32, 23, 16, 0.22);
      opacity: 0;
      visibility: hidden;
      transition: .25s ease;
    }

    .side-menu {
      position: fixed;
      top: 0;
      z-index: 2100;
      width: min(84vw, 320px);
      height: 100vh;
      padding: 26px 20px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: .25s ease;
      overflow-y: auto;
    }

    html[dir="rtl"] .side-menu {
      left: 0;
      right: auto;
      box-shadow: 16px 0 40px rgba(66,43,19,0.12);
      transform: translateX(-100%);
    }

    body.menu-open .side-menu {
      transform: translateX(0);
    }

    body.menu-open .side-menu-overlay {
      opacity: 1;
      visibility: visible;
    }

    .side-menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 22px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(95,70,48,0.08);
    }

    .side-menu-head strong {
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .menu-close-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--text);
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }

    .side-menu-links {
      display: grid;
      gap: 8px;
    }

    .menu-link {
      display: block;
      padding: 10px 0;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      transition: .2s ease;
      border-bottom: 1px solid rgba(95,70,48,0.06);
      background: transparent;
      cursor: pointer;
    }

    .menu-link:hover {
      color: var(--brand-dark);
      padding-inline-start: 6px;
    }

    .shell {
      padding: 20px 0 34px;
    }

    .page-title {
      margin: 0 0 16px;
      padding: 4px 2px 0;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--brand-dark);
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .action-button {
      width: 100%;
      min-height: 110px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-2xl);
      background: linear-gradient(180deg, rgba(255,255,255,0.74), rgba(255,255,255,0.48));
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: right;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .action-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 42px rgba(66,43,19,0.12);
    }

    .action-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      direction: ltr;
    }

    .action-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      direction: rtl;
      text-align: right;
      flex: 1;
      line-height: 1.4;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.64));
      border: 1px solid rgba(95,70,48,0.10);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 16px rgba(66,43,19,0.05);
      flex-shrink: 0;
    }

    .status-strip {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(95,70,48,0.08);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .status-strip.show {
      display: block;
    }

    .status-strip.error {
      color: #991b1b;
      background: rgba(212,84,84,0.10);
      border-color: rgba(212,84,84,0.16);
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.74), rgba(255,255,255,0.48));
      border: 1px solid var(--line);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72));
      border: 1px solid rgba(95,70,48,0.10);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.green { background: var(--success); }
    .dot.yellow { background: var(--warning); }
    .dot.red { background: var(--danger); }

    .calendar-wrap {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255,255,255,0.35);
      border: 1px solid rgba(95,70,48,0.08);
      min-height: 340px;
    }

    #calendar {
      min-height: 320px;
      padding: 8px;
    }

    .calendar-loading {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(248,244,238,0.90));
      transition: opacity .35s ease, visibility .35s ease;
    }

    .calendar-loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .calendar-loading-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      padding: 24px;
    }

    .calendar-loading-logo {
      width: 82px;
      height: 82px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(246,240,232,0.85));
      border: 1px solid rgba(95,70,48,0.10);
      box-shadow: var(--shadow-md);
    }

    .calendar-loading-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .calendar-spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid rgba(139,106,72,0.14);
      border-top-color: var(--brand);
      animation: spin .9s linear infinite;
    }

    .calendar-loading-text {
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .fc {
      --fc-border-color: rgba(95,70,48,0.10);
      --fc-page-bg-color: transparent;
      --fc-neutral-bg-color: rgba(255,255,255,0.26);
      --fc-today-bg-color: rgba(236,228,216,0.74);
      color: var(--text);
    }

    .fc-theme-standard td,
    .fc-theme-standard th {
      border-color: rgba(95,70,48,0.08);
    }

    .fc .fc-toolbar {
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .fc .fc-toolbar-title {
      font-size: clamp(1.05rem, 3vw, 1.4rem);
      color: var(--text);
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .fc .fc-button {
      min-height: 40px;
      border-radius: 13px;
      border: 1px solid rgba(95,70,48,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(246,240,232,0.88));
      color: var(--text);
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(66,43,19,0.05);
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active,
    .fc .fc-button:hover {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(236,228,216,0.92));
      color: var(--text);
      border-color: rgba(95,70,48,0.16);
    }

    .fc .fc-daygrid-day-frame {
      min-height: 94px;
      padding: 2px;
    }

    .fc-daygrid-day-top {
      padding: 2px 4px;
    }

    .fc-daygrid-event {
      border: 0;
      border-radius: 12px;
      padding: 4px 6px;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 10px 18px rgba(66,43,19,0.10);
      cursor: pointer;
    }

    .fc-daygrid-day-number,
    .fc-col-header-cell-cushion {
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      font-size: 13px;
    }

    .fc .fc-day-today {
      background: rgba(236,228,216,0.74) !important;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      background: rgba(32, 23, 16, 0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .modal.active {
      display: flex;
    }

    .modal-card {
      width: min(100%, 920px);
      max-width: 920px;
      max-height: 90vh;
      overflow: auto;
      padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
      border-radius: 28px 28px 0 0;
      border: 1px solid rgba(95,70,48,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.76));
      box-shadow: 0 -20px 42px rgba(66,43,19,0.16);
      backdrop-filter: blur(26px) saturate(1.2);
      -webkit-backdrop-filter: blur(26px) saturate(1.2);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-head h2 {
      margin: 0;
      color: var(--text);
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .modal-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .modal-close-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid rgba(95,70,48,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.58));
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(66,43,19,0.05);
    }

    .list-wrap {
      display: grid;
      gap: 12px;
    }

    .booking-card {
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.90), rgba(255,255,255,0.66));
      border: 1px solid rgba(95,70,48,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(66,43,19,0.05);
    }

    .booking-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .booking-head h3 {
      margin: 0 0 4px;
      font-size: 18px;
      color: var(--text);
    }

    .booking-sub {
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.pending {
      background: rgba(227,161,43,0.14);
      color: #9a6700;
      border: 1px solid rgba(227,161,43,0.18);
    }

    .badge.booked {
      background: rgba(212,84,84,0.14);
      color: #991b1b;
      border: 1px solid rgba(212,84,84,0.18);
    }

    .booking-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .meta-box {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(95,70,48,0.08);
    }

    .meta-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .meta-value {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }

    .booking-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .booking-actions button,
    .booking-actions a,
    .booking-actions div {
      min-height: 46px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      width: 100%;
      border: none;
      cursor: pointer;
    }

    .btn-confirm {
      color: #fff;
      background: linear-gradient(135deg, #24a46d, #198d5c);
      box-shadow: 0 14px 26px rgba(36,164,109,0.22);
    }

    .btn-reject {
      color: #fff;
      background: linear-gradient(135deg, #d45454, #be4343);
      box-shadow: 0 14px 26px rgba(212,84,84,0.22);
    }

    .wa-link {
      color: #fff;
      background: linear-gradient(135deg, #25d366, #1ebe5d);
      box-shadow: 0 14px 26px rgba(37,211,102,0.22);
    }

    .status-message {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-size: 13px;
      line-height: 1.7;
    }

    .status-message.success {
      display: block;
      background: rgba(36,164,109,0.12);
      border-color: rgba(36,164,109,0.18);
      color: #166534;
    }

    .status-message.error {
      display: block;
      background: rgba(212,84,84,0.12);
      border-color: rgba(212,84,84,0.18);
      color: #991b1b;
    }

    .empty-state {
      padding: 26px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.46);
      border: 1px dashed rgba(95,70,48,0.18);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .full-width { grid-column: 1 / -1; }

    label {
      display: block;
      margin-bottom: 5px;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-width: 0;
      min-height: 46px;
      padding: 12px 13px;
      border-radius: 16px;
      border: 1px solid rgba(95,70,48,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72));
      color: var(--text);
      outline: none;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.72), 0 6px 14px rgba(66,43,19,0.04);
    }

    input[type="date"] {
      direction: ltr;
      text-align: right;
      appearance: none;
      -webkit-appearance: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .submit-row {
      display: grid;

  <script>
    const SUPABASE_URL = 'https://ywhumxkejpnzfkvvxxvd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_08n0jwiyG7bkqATkyyL7yA_WBgELYt5';
    const SUPABASE_BOOKINGS_TABLE = 'rafana_bookings';
    const RAVANA_RESORT_NAMES = ['شاليه رافانا A', 'شاليه رافانا B', 'شاليه رافانا C'];

    function isSupabaseConfigured() {
      return SUPABASE_URL &&
        SUPABASE_ANON_KEY &&
        !SUPABASE_URL.includes('YOUR-PROJECT') &&
        SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
    }

    function ensureSupabaseConfigured() {
      if (!isSupabaseConfigured()) {
        throw new Error('يرجى ضبط SUPABASE_URL و SUPABASE_ANON_KEY داخل الملف.');
      }
    }

    function supabaseRestBase() {
      return SUPABASE_URL.replace(/\/$/, '') + '/rest/v1';
    }

    function supabaseHeaders(extra) {
      return Object.assign({
        apikey: SUPABASE_ANON_KEY,
        Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
        Accept: 'application/json'
      }, extra || {});
    }

    function supabaseIsoDate(value) {
      if (!value) return '';
      if (typeof value === 'string') return value.trim().slice(0, 10);
      const d = new Date(value);
      if (isNaN(d.getTime())) return '';
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function supabaseTodayIso() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function supabaseAddDays(dateStr, days) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setDate(d.getDate() + days);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function mapSupabaseBookingRow(row) {
      const date = supabaseIsoDate(row.booking_date || row.date || row['التاريخ']);
      const resort = String(row.resort || row['الاستراحة'] || row['الشاليه'] || '').trim();
      const status = String(row.status || row['الحالة'] || 'متاح').trim() || 'متاح';
      const bookingType = String(row.booking_type || row.bookingType || row['نوع الحجز'] || '').trim();
      const name = String(row.customer_name || row.name || row['الاسم'] || '').trim();
      const phone = String(row.phone || row['الجوال'] || '').trim();
      const notes = String(row.notes || row['ملاحظات'] || '').trim();
      const bookingPrice = row.booking_price != null ? String(row.booking_price) : String(row.bookingPrice || row['سعر الحجز'] || '');
      const refundableDeposit = row.refundable_deposit != null ? String(row.refundable_deposit) : String(row.refundableDeposit || row['التأمين المسترد'] || '');

      return {
        id: row.id || '',
        date,
        resort,
        status,
        bookingType,
        name,
        phone,
        notes,
        bookingPrice,
        refundableDeposit,
        'التاريخ': date,
        'الاستراحة': resort,
        'الحالة': status,
        'نوع الحجز': bookingType,
        'الاسم': name,
        'الجوال': phone,
        'ملاحظات': notes,
        'سعر الحجز': bookingPrice,
        'التأمين المسترد': refundableDeposit
      };
    }

    async function fetchSupabaseStoredBookings(options = {}) {
      ensureSupabaseConfigured();

      const params = new URLSearchParams();
      params.set('select', '*');
      params.set('order', 'booking_date.asc');

      if (options.from) {
        params.set('booking_date', 'gte.' + options.from);
      }

      if (options.to) {
        params.append('booking_date', 'lte.' + options.to);
      }

      if (options.statuses && options.statuses.length) {
        params.set('status', 'in.(' + options.statuses.join(',') + ')');
      }

      const response = await fetch(supabaseRestBase() + '/' + SUPABASE_BOOKINGS_TABLE + '?' + params.toString(), {
        method: 'GET',
        cache: 'no-store',
        headers: supabaseHeaders()
      });

      const text = await response.text();
      let json = [];

      try {
        json = text ? JSON.parse(text) : [];
      } catch (e) {
        throw new Error('تعذر قراءة رد Supabase.');
      }

      if (!response.ok) {
        throw new Error((json && json.message) || text || ('HTTP ' + response.status + ' failed'));
      }

      return Array.isArray(json) ? json : [];
    }

    function buildAvailabilityRowsForRange(startDate, endDate) {
      const rows = [];
      const start = new Date(startDate + 'T00:00:00');
      const end = new Date(endDate + 'T00:00:00');

      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const date = y + '-' + m + '-' + day;

        RAVANA_RESORT_NAMES.forEach(function(resort) {
          rows.push(mapSupabaseBookingRow({
            booking_date: date,
            resort: resort,
            status: 'متاح'
          }));
        });
      }

      return rows;
    }

    function mergeCalendarRangeData(storedRows, startDate, endDate) {
      const map = new Map();

      buildAvailabilityRowsForRange(startDate, endDate).forEach(function(row) {
        map.set(row['التاريخ'] + '|' + row['الاستراحة'], row);
      });

      storedRows.map(mapSupabaseBookingRow).forEach(function(row) {
        if (!row['التاريخ'] || !row['الاستراحة']) return;
        map.set(row['التاريخ'] + '|' + row['الاستراحة'], row);
      });

      return Array.from(map.values());
    }

    async function upsertSupabaseBooking(payload) {
      ensureSupabaseConfigured();

      const row = {
        booking_date: payload.date,
        resort: payload.resort,
        booking_type: payload.bookingType || null,
        booking_price: payload.bookingPrice != null ? Number(payload.bookingPrice) : null,
        refundable_deposit: payload.refundableDeposit != null ? Number(payload.refundableDeposit) : null,
        customer_name: payload.name || null,
        phone: payload.phone || null,
        notes: payload.notes || null,
        status: payload.status || 'محجوز',
        updated_at: new Date().toISOString()
      };

      const response = await fetch(supabaseRestBase() + '/' + SUPABASE_BOOKINGS_TABLE + '?on_conflict=booking_date,resort', {
        method: 'POST',
        headers: supabaseHeaders({
          'Content-Type': 'application/json',
          Prefer: 'resolution=merge-duplicates,return=representation'
        }),
        body: JSON.stringify(row)
      });

      const text = await response.text();
      let json = null;

      try {
        json = text ? JSON.parse(text) : null;
      } catch (e) {}

      if (!response.ok) {
        throw new Error((json && json.message) || text || ('HTTP ' + response.status + ' failed'));
      }

      return json;
    }

    async function deleteSupabaseBooking(date, resort) {
      ensureSupabaseConfigured();

      const params = new URLSearchParams();
      params.set('booking_date', 'eq.' + date);
      params.set('resort', 'eq.' + resort);

      const response = await fetch(supabaseRestBase() + '/' + SUPABASE_BOOKINGS_TABLE + '?' + params.toString(), {
        method: 'DELETE',
        headers: supabaseHeaders({ Prefer: 'return=minimal' })
      });

      const text = await response.text();
      let json = null;

      try {
        json = text ? JSON.parse(text) : null;
      } catch (e) {}

      if (!response.ok) {
        throw new Error((json && json.message) || text || ('HTTP ' + response.status + ' failed'));
      }
    }

    async function updateSupabaseBookingStatus(date, resort, status) {
      ensureSupabaseConfigured();

      if (status === 'متاح') {
        await deleteSupabaseBooking(date, resort);
        return { success: true };
      }

      const params = new URLSearchParams();
      params.set('booking_date', 'eq.' + date);
      params.set('resort', 'eq.' + resort);

      const response = await fetch(supabaseRestBase() + '/' + SUPABASE_BOOKINGS_TABLE + '?' + params.toString(), {
        method: 'PATCH',
        headers: supabaseHeaders({
          'Content-Type': 'application/json',
          Prefer: 'return=representation'
        }),
        body: JSON.stringify({
          status: status,
          updated_at: new Date().toISOString()
        })
      });

      const text = await response.text();
      let json = null;

      try {
        json = text ? JSON.parse(text) : null;
      } catch (e) {}

      if (!response.ok) {
        throw new Error((json && json.message) || text || ('HTTP ' + response.status + ' failed'));
      }

      return { success: true, data: json };
    }

    function normalizeDate(value) {
      if (!value) return '';
      if (typeof value === 'string') return value.trim().slice(0, 10);
      const date = new Date(value);
      if (isNaN(date.getTime())) return '';
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function toYMD(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function normalizePhoneForWhatsApp(phone) {
      let digits = String(phone || '').replace(/[^0-9]/g, '');
      if (digits.indexOf('00') === 0) digits = digits.slice(2);
      return digits;
    }

      const value = String(resort || '').trim();
      if (value === 'شاليه رافانا A') return 'A';
      if (value === 'شاليه رافانا B') return 'B';

      if (status === 'بانتظار التأكيد') return '#e3a12b';

      return currentCalendarData.map(function(item) {

        return {

            notes: String(item['ملاحظات'] || '').trim() || '-'
          }
        };
      }).filter(function(item) {
        return item.start;
      });
    }

    function updateCalendarEvents() {
      if (!calendar) return;
      calendar.removeAllEvents();
      buildCalendarEvents().forEach(function(event) {
        calendar.addEvent(event);

    function renderCalendar() {
      const calendarEl = document.getElementById('calendar');

      if (calendar) calendar.destroy();

      calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'ar',
        direction: 'rtl',
        initialView: 'dayGridMonth',
        height: 'auto',
        headerToolbar: {
          right: 'prev,next today',
          center: 'title',
          left: ''
        },
        buttonText: { today: 'اليوم' },
        editable: false,
        selectable: false,
        events: [],
        datesSet(info) {
          const startDate = toYMD(info.start);
          const endDate = toYMD(new Date(info.end.getTime() - 86400000));
          loadCalendarRange(startDate, endDate);
        },
        dateClick: function() {},
        eventClick: function(info) {
          info.jsEvent.preventDefault();
          openCalendarEvent(info.event.extendedProps || {});
        }
      });

      calendar.render();
    }

    async function loadStoredBookings() {
      const today = supabaseTodayIso();

      const rows = await fetchSupabaseStoredBookings({
        from: today,
        statuses: ['بانتظار التأكيد', 'محجوز']
      });

      storedBookings = rows.map(mapSupabaseBookingRow);

      const pending = storedBookings.filter(function(item) {
        return String(item['الحالة'] || '').trim() === 'بانتظار التأكيد';
      });

      const booked = storedBookings.filter(function(item) {
        return String(item['الحالة'] || '').trim() === 'محجوز';
      });

      pendingCount.textContent = String(pending.length);
      bookedCount.textContent = String(booked.length);
    }

    async function loadCalendarRange(startDate, endDate, forceRefresh = false) {
      const cacheKey = startDate + '|' + endDate;
      currentRange = { startDate, endDate };

      if (!forceRefresh && calendarRangeCache.has(cacheKey)) {
        currentCalendarData = calendarRangeCache.get(cacheKey);
        updateCalendarEvents();
        calendarLoading.classList.add('hidden');
        return;
      }

      try {
        calendarLoading.classList.remove('hidden');

        const rows = await fetchSupabaseStoredBookings({
          from: startDate,
          to: endDate
        });

        const merged = mergeCalendarRangeData(rows, startDate, endDate);
        calendarRangeCache.set(cacheKey, merged);
        currentCalendarData = merged;
        updateCalendarEvents();
      } catch (error) {
        console.error(error);
        showStrip('تعذر تحميل بيانات التقويم.', true);
      } finally {
        calendarLoading.classList.add('hidden');
      }
    }

    async function loadBookings() {
      try {
        showStrip('جاري تحميل البيانات...');
        await loadStoredBookings();
        hideStrip();

        if (listModal.classList.contains('active')) {
          renderCurrentView();
        }

        if (!calendar) {
          renderCalendar();
        } else if (currentRange) {
          await loadCalendarRange(currentRange.startDate, currentRange.endDate, true);
        }
      } catch (error) {
        console.error(error);
        showStrip('تعذر تحميل البيانات', true);

        if (listModal.classList.contains('active')) {
          listWrap.innerHTML = '<div class="empty-state">تعذر تحميل البيانات.</div>';
        }
      }
    }

    function getItemsByView(view) {
      const filtered = storedBookings.filter(function(item) {
        const status = String(item['الحالة'] || '').trim();
        return view === 'pending' ? status === 'بانتظار التأكيد' : status === 'محجوز';
      });

      return filtered.sort(function(a, b) {
        return normalizeDate(a['التاريخ']).localeCompare(normalizeDate(b['التاريخ']));
      });
    }

    function renderCurrentView() {
      clearStatus(statusMessage);
      const items = getItemsByView(currentView);

      if (currentView === 'pending') {
        modalTitle.textContent = 'طلبات حجز جديدة';
        modalSubtitle.textContent = 'قائمة الطلبات بحالة بانتظار التأكيد.';
      } else {
        modalTitle.textContent = 'الحجوزات المؤكدة';
        modalSubtitle.textContent = 'قائمة الحجوزات بحالة محجوز.';
      }

      if (!items.length) {
        listWrap.innerHTML = '<div class="empty-state">لا توجد سجلات في هذه القائمة حاليًا.</div>';
        return;
      }

      listWrap.innerHTML = items.map(function(item) {
        return renderRecordCard(item, currentView === 'pending' ? 'pending' : 'booked');
      }).join('');
    }

    function openList(view) {
      currentView = view;
      renderCurrentView();
      listModal.classList.add('active');
    }

    function closeList() {
      listModal.classList.remove('active');
      clearStatus(statusMessage);
    }

    function openAddModal(prefill) {
      clearStatus(addStatusMessage);
      adminDate.value = (prefill && prefill.date) ? prefill.date : '';
      adminResort.value = (prefill && prefill.resort) ? prefill.resort : '';
      adminBookingType.value = (prefill && prefill.bookingType && prefill.bookingType !== '-') ? prefill.bookingType : 'بدون مبيت';
      adminName.value = (prefill && prefill.name && prefill.name !== '-') ? prefill.name : '';
      adminPhone.value = (prefill && prefill.phone && prefill.phone !== '-') ? sanitizePhone(prefill.phone) : '';
      adminNotes.value = (prefill && prefill.notes && prefill.notes !== '-') ? prefill.notes : '';
      addModal.classList.add('active');
    }

    function closeAddBookingModal() {
      addModal.classList.remove('active');
      clearStatus(addStatusMessage);
    }

    function openCalendarEvent(record) {
      const status = String(record.status || '').trim();

      if (status === 'متاح') {
        openAddModal({
          date: record.date || '',
          resort: record.resort || '',
          bookingType: 'بدون مبيت',
          name: '',
          phone: '',
          notes: ''
        });
        return;
      }

      modalTitle.textContent = status === 'بانتظار التأكيد' ? 'طلب حجز بانتظار التأكيد' : 'حجز مؤكد';
      modalSubtitle.textContent = 'بيانات الحجز للتاريخ المحدد.';
      clearStatus(statusMessage);
      listWrap.innerHTML = renderRecordCard(record, status === 'بانتظار التأكيد' ? 'pending' : 'booked');
      listModal.classList.add('active');
    }

    function renderRecordCard(record, viewType) {
      const date = normalizeDate(record.date || record['التاريخ']);
      const resort = String(record.resort || record['الاستراحة'] || '').trim();
      const status = String(record.status || record['الحالة'] || '').trim();
      const bookingType = String(record.bookingType || record['نوع الحجز'] || '').trim() || '-';
      const name = String(record.name || record['الاسم'] || '').trim() || '-';
      const phone = String(record.phone || record['الجوال'] || '').trim() || '-';
      const notes = String(record.notes || record['ملاحظات'] || '').trim() || '-';
      const waLink = getWhatsAppLink({ 'الجوال': phone, 'الاسم': name, 'الاستراحة': resort, 'التاريخ': date });
      const badgeClass = viewType === 'pending' ? 'pending' : 'booked';

      let actionsHtml = '';

      if (viewType === 'pending') {
        actionsHtml += '<button class="btn-confirm" type="button" data-confirm-date="' + date + '" data-confirm-resort="' + resort + '">تأكيد الحجز</button>';
        actionsHtml += '<button class="btn-reject" type="button" data-reject-date="' + date + '" data-reject-resort="' + resort + '">رفض الحجز</button>';
      } else {
        actionsHtml += '<button class="btn-reject" type="button" data-cancel-date="' + date + '" data-cancel-resort="' + resort + '">إلغاء الحجز</button>';
      }

      if (waLink) {
        actionsHtml += '<a class="wa-link" href="' + waLink + '" target="_blank" rel="noopener noreferrer">واتساب العميل</a>';
      } else {
        actionsHtml += '<div class="wa-link" style="opacity:.75;pointer-events:none;">لا يوجد واتساب</div>';
      }

      return '' +
        '<article class="booking-card">' +
          '<div class="booking-head">' +
            '<div>' +
              '<h3>' + resort + '</h3>' +
              '<div class="booking-sub">التاريخ: ' + date + '</div>' +
            '</div>' +
            '<span class="badge ' + badgeClass + '">' + status + '</span>' +
          '</div>' +
          '<div class="booking-grid">' +
            '<div class="meta-box"><div class="meta-label">نوع الحجز</div><div class="meta-value">' + bookingType + '</div></div>' +
            '<div class="meta-box"><div class="meta-label">الاسم</div><div class="meta-value">' + name + '</div></div>' +
            '<div class="meta-box"><div class="meta-label">الجوال</div><div class="meta-value">' + phone + '</div></div>' +
            '<div class="meta-box"><div class="meta-label">الملاحظات</div><div class="meta-value">' + notes + '</div></div>' +
          '</div>' +
          '<div class="booking-actions">' + actionsHtml + '</div>' +
        '</article>';
    }

    function sanitizePhone(value) {
      const arabicIndic = '٠١٢٣٤٥٦٧٨٩';
      const easternArabicIndic = '۰۱۲۳۴۵۶۷۸۹';

      let result = String(value || '').split('').map(function(ch) {
        const idx1 = arabicIndic.indexOf(ch);
        if (idx1 > -1) return String(idx1);
        const idx2 = easternArabicIndic.indexOf(ch);
        if (idx2 > -1) return String(idx2);
        return ch;
      }).join('');

      return result.replace(/[^0-9]/g, '');
    }

    async function refreshAllData() {
      calendarRangeCache.clear();
      await loadBookings();
    }

    async function updateBookingStatus(date, resort, status, loadingMessage, successMessage) {
      try {
        showStatus(statusMessage, loadingMessage, 'success');
        await updateSupabaseBookingStatus(date, resort, status);
        showStatus(statusMessage, successMessage, 'success');
        await refreshAllData();
        renderCurrentView();
      } catch (error) {
        console.error(error);
        showStatus(statusMessage, error.message || 'حدث خطأ أثناء تحديث الحالة', 'error');
      }
    }

    async function confirmBooking(date, resort) {
      const sure = window.confirm('هل أنت متأكد من تأكيد هذا الحجز؟');
      if (!sure) return;
      await updateBookingStatus(date, resort, 'محجوز', 'جاري تأكيد الحجز...', 'تم تأكيد الحجز بنجاح.');
    }

    async function rejectBooking(date, resort) {
      const sure = window.confirm('هل أنت متأكد من رفض هذا الحجز؟');
      if (!sure) return;
      await updateBookingStatus(date, resort, 'متاح', 'جاري رفض الحجز...', 'تم رفض الحجز وإعادة الحالة إلى متاح.');
    }

    async function cancelBooked(date, resort) {
      const sure = window.confirm('هل أنت متأكد من إلغاء هذا الحجز؟');
      if (!sure) return;
      await updateBookingStatus(date, resort, 'متاح', 'جاري إلغاء الحجز...', 'تم إلغاء الحجز وإعادة الحالة إلى متاح.');
    }

    async function createBookedByAdmin() {
      const date = adminDate.value;
      const resort = adminResort.value;
      const bookingType = adminBookingType.value;
      const name = adminName.value.trim();
      const phone = sanitizePhone(adminPhone.value.trim());
      const notes = adminNotes.value.trim();

      adminPhone.value = phone;

      if (!date || !resort || !bookingType || !name || !phone) {
        showStatus(addStatusMessage, 'يرجى تعبئة جميع الحقول المطلوبة.', 'error');
        return;
      }

      try {
        showStatus(addStatusMessage, 'جاري حفظ الحجز المؤكد...', 'success');

        await upsertSupabaseBooking({
          date,
          resort,
          bookingType,
          name,
          phone,
          notes,
          status: 'محجوز'
        });

        showStatus(addStatusMessage, 'تمت إضافة الحجز المؤكد بنجاح.', 'success');
        await refreshAllData();
        setTimeout(closeAddBookingModal, 700);
      } catch (error) {
        console.error(error);
        showStatus(addStatusMessage, error.message || 'حدث خطأ أثناء حفظ الحجز', 'error');
      }
    }

    function openMenu() {
      document.body.classList.add('menu-open');
    }

    function closeMenu() {
      document.body.classList.remove('menu-open');
    }

    pendingBtn.addEventListener('click', function() { openList('pending'); });
    bookedBtn.addEventListener('click', function() { openList('booked'); });
    addBookedBtn.addEventListener('click', function() { openAddModal(); });
    closeModal.addEventListener('click', closeList);
    closeAddModal.addEventListener('click', closeAddBookingModal);
    cancelAdminBooking.addEventListener('click', closeAddBookingModal);
    submitAdminBooking.addEventListener('click', createBookedByAdmin);

    adminPhone.addEventListener('input', function() {
      adminPhone.value = sanitizePhone(adminPhone.value);
    });

    listModal.addEventListener('click', function(e) {
      if (e.target === listModal) closeList();

      if (e.target.matches('[data-confirm-date][data-confirm-resort]')) {
        confirmBooking(e.target.getAttribute('data-confirm-date'), e.target.getAttribute('data-confirm-resort'));
      }

      if (e.target.matches('[data-reject-date][data-reject-resort]')) {
        rejectBooking(e.target.getAttribute('data-reject-date'), e.target.getAttribute('data-reject-resort'));
      }

      if (e.target.matches('[data-cancel-date][data-cancel-resort]')) {
        cancelBooked(e.target.getAttribute('data-cancel-date'), e.target.getAttribute('data-cancel-resort'));
      }
    });

    addModal.addEventListener('click', function(e) {
      if (e.target === addModal) closeAddBookingModal();
    });

    menuToggle.addEventListener('click', openMenu);
    closeMenuBtn.addEventListener('click', closeMenu);
    sideMenuOverlay.addEventListener('click', closeMenu);

    loadBookings();
  </script>
</body>
</html>
