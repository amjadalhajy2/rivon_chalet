<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة مدير الحجوزات</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/locales-all.global.min.js"></script>
  <style>
    :root {
      --bg-top: #eef5ff;
      --bg-mid: #f5f7fb;
      --bg-btm: #eef2f8;
      --line: rgba(255, 255, 255, 0.36);
      --line-strong: rgba(255, 255, 255, 0.54);
      --text: #152033;
      --muted: #5e6b82;
      --success: #19a765;
      --danger: #f05d5e;
      --warning: #f59e0b;
      --shadow-xl: 0 30px 80px rgba(25, 43, 77, 0.14);
      --shadow-md: 0 10px 24px rgba(25, 43, 77, 0.08);
      --radius-2xl: 34px;
      --radius-xl: 28px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }

    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(110,168,255,0.24), transparent 22%),
        radial-gradient(circle at 88% 14%, rgba(139,125,255,0.14), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(184,211,255,0.26), transparent 30%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 44%, var(--bg-btm) 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.28), transparent 24%),
        radial-gradient(circle at 80% 22%, rgba(255,255,255,0.18), transparent 18%);
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 20px 14px 34px;
    }

    .brand-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 2px 20px;
    }

    .logo-box {
      width: 68px;
      height: 68px;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.54));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), var(--shadow-md);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-copy h1 {
      margin: 0 0 4px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .brand-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .action-button {
      width: 100%;
      min-height: 92px;
      padding: 18px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-2xl);
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.42));
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      text-align: right;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .action-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 42px rgba(25, 43, 77, 0.12);
    }

    .action-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      direction: ltr;
    }

    .action-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      direction: rtl;
      text-align: right;
      flex: 1;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.58));
      border: 1px solid var(--line-strong);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 16px rgba(25,43,77,0.05);
      flex-shrink: 0;
    }

    .status-strip {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(255,255,255,0.4);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.42));
      border: 1px solid var(--line);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      padding: 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.5));
      border: 1px solid var(--line-strong);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.green { background: var(--success); }
    .dot.yellow { background: var(--warning); }
    .dot.red { background: var(--danger); }

    .calendar-wrap {
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.25);
      min-height: 340px;
    }

    #calendar {
      min-height: 320px;
      padding: 8px;
    }

    .fc {
      --fc-border-color: rgba(255,255,255,0.32);
      --fc-page-bg-color: transparent;
      --fc-neutral-bg-color: rgba(255,255,255,0.22);
      --fc-today-bg-color: rgba(217,232,255,0.48);
      color: var(--text);
    }

    .fc-theme-standard td,
    .fc-theme-standard th { border-color: rgba(255,255,255,0.26); }

    .fc .fc-toolbar {
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .fc .fc-toolbar-title {
      font-size: clamp(1.05rem, 3vw, 1.4rem);
      color: var(--text);
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .fc .fc-button {
      min-height: 40px;
      border-radius: 13px;
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.52));
      color: var(--text);
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(25,43,77,0.05);
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active,
    .fc .fc-button:hover {
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(228,239,255,0.82));
      color: var(--text);
      border-color: rgba(255,255,255,0.62);
    }

    .fc .fc-daygrid-day-frame { min-height: 94px; padding: 2px; }
    .fc-daygrid-day-top { padding: 2px 4px; }

    .fc-daygrid-event {
      border: 0;
      border-radius: 12px;
      padding: 4px 6px;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 10px 18px rgba(25,43,77,0.10);
      cursor: pointer;
    }

    .fc-daygrid-day-number,
    .fc-col-header-cell-cushion {
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      font-size: 13px;
    }

    .fc .fc-day-today { background: rgba(235,243,255,0.88) !important; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      background: rgba(18, 28, 46, 0.24);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .modal.active { display: flex; }

    .modal-card {
      width: min(100%, 860px);
      max-width: 860px;
      max-height: 90vh;
      overflow: auto;
      padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
      border-radius: 28px 28px 0 0;
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.68));
      box-shadow: 0 -20px 42px rgba(25,43,77,0.16);
      backdrop-filter: blur(26px) saturate(1.2);
      -webkit-backdrop-filter: blur(26px) saturate(1.2);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-head h2 {
      margin: 0;
      color: var(--text);
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .modal-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.58));
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(25,43,77,0.05);
    }

    .list-wrap {
      display: grid;
      gap: 12px;
    }

    .booking-card {
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.58));
      border: 1px solid var(--line-strong);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(25,43,77,0.05);
    }

    .booking-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .booking-head h3 {
      margin: 0 0 4px;
      font-size: 18px;
      color: var(--text);
    }

    .booking-sub {
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.pending {
      background: rgba(245,158,11,0.14);
      color: #9a6700;
      border: 1px solid rgba(245,158,11,0.18);
    }

    .badge.booked {
      background: rgba(240,93,94,0.14);
      color: #991b1b;
      border: 1px solid rgba(240,93,94,0.18);
    }

    .booking-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .meta-box {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(255,255,255,0.34);
    }

    .meta-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .meta-value {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }

    .booking-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .booking-actions button,
    .booking-actions a,
    .booking-actions div {
      min-height: 46px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      width: 100%;
      border: none;
      cursor: pointer;
    }

    .btn-confirm {
      color: #fff;
      background: linear-gradient(135deg, #19a765, #1f9d63);
      box-shadow: 0 14px 26px rgba(25, 167, 101, 0.22);
    }

    .btn-reject {
      color: #fff;
      background: linear-gradient(135deg, #f05d5e, #dc4f50);
      box-shadow: 0 14px 26px rgba(240, 93, 94, 0.22);
    }

    .wa-link {
      color: #fff;
      background: linear-gradient(135deg, #25d366, #1ebe5d);
      box-shadow: 0 14px 26px rgba(37, 211, 102, 0.22);
    }

    .status-message {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-size: 13px;
      line-height: 1.7;
    }

    .status-message.success {
      display: block;
      background: rgba(25,167,101,0.12);
      border-color: rgba(25,167,101,0.18);
      color: #166534;
    }

    .status-message.error {
      display: block;
      background: rgba(240,93,94,0.12);
      border-color: rgba(240,93,94,0.18);
      color: #991b1b;
    }

    .empty-state {
      padding: 26px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.46);
      border: 1px dashed rgba(255,255,255,0.54);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .full-width { grid-column: 1 / -1; }

    .form-grid > div,
    .submit-row > * {
      min-width: 0;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 46px;
      padding: 12px 13px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.44);
      background: linear-gradient(180deg, rgba(255,255,255,0.90), rgba(255,255,255,0.62));
      color: var(--text);
      outline: none;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.72), 0 6px 14px rgba(25,43,77,0.04);
    }

    input[type="date"] {
      direction: ltr;
      text-align: right;
      appearance: none;
      -webkit-appearance: none;
    }

    #adminDate {
      width: 100%;
      max-width: 100%;
      font-size: 14px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .submit-row {
      display: grid;
      grid-template-columns: 1.7fr 1fr;
      gap: 8px;
      margin-top: 12px;
      width: 100%;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #5f8cff, #8b7dff);
      border: none;
      box-shadow: 0 16px 28px rgba(95,140,255,0.28);
      cursor: pointer;
      font-weight: 800;
    }

    .btn-secondary {
      cursor: pointer;
      font-weight: 800;
    }

    .submit-row button {
      width: 100%;
      min-height: 50px;
    }

    @media (min-width: 760px) {
      .action-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .shell { padding: 16px 10px 24px; }
      .logo-box { width: 58px; height: 58px; border-radius: 18px; }
      .brand-copy h1 { font-size: 24px; }
      .brand-copy p { font-size: 12px; }
      .action-title { font-size: 20px; }
      .modal-card {
        width: calc(100vw - 12px);
        max-width: calc(100vw - 12px);
        max-height: 88vh;
        margin: 0 6px;
        padding: 14px 10px calc(16px + env(safe-area-inset-bottom));
      }
      .booking-grid,
      .booking-actions,
      .form-grid,
      .submit-row {
        grid-template-columns: 1fr;
      }
      input,
      select,
      textarea {
        font-size: 14px;
        min-height: 44px;
        padding: 11px 12px;
      }
      #adminDate {
        font-size: 14px;
        width: 100%;
        max-width: 100%;
      }
      textarea { min-height: 84px; }
      .submit-row button { min-height: 48px; }
      .fc .fc-toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .fc .fc-toolbar-chunk {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .fc .fc-daygrid-day-frame { min-height: 78px; }
      .fc-daygrid-event { font-size: 10px; padding: 3px 5px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="brand-header">
      <div class="logo-box">
        <img src="logo.png" alt="شعار استراحاتنا الثلاث" onerror="this.style.display='none'; this.parentNode.innerHTML='🏡'">
      </div>
      <div class="brand-copy">
        <h1>لوحة مدير الحجوزات</h1>
        <p>إدارة الطلبات الجديدة والمؤكدة وإضافة حجوزات مؤكدة.</p>
      </div>
    </section>

    <section class="action-grid">
      <button class="action-button" id="pendingBtn" type="button">
        <div class="action-top">
          <div class="count-badge" id="pendingCount">0</div>
          <div class="action-title">طلبات حجز جديدة</div>
        </div>
      </button>

      <button class="action-button" id="bookedBtn" type="button">
        <div class="action-top">
          <div class="count-badge" id="bookedCount">0</div>
          <div class="action-title">الحجوزات المؤكدة</div>
        </div>
      </button>

      <button class="action-button" id="addBookedBtn" type="button">
        <div class="action-top">
          <div class="count-badge">+</div>
          <div class="action-title">إضافة حجز مؤكد</div>
        </div>
      </button>
    </section>

    <div class="status-strip" id="statusStrip">جاري تحميل البيانات...</div>

    <section class="card">
      <div class="section-head">
        <h2>التقويم</h2>
      </div>
      <div class="legend">
        <span class="legend-item"><i class="dot green"></i> متاح</span>
        <span class="legend-item"><i class="dot yellow"></i> بانتظار التأكيد</span>
        <span class="legend-item"><i class="dot red"></i> محجوز</span>
      </div>
      <div class="calendar-wrap">
        <div id="calendar"></div>
      </div>
    </section>
  </div>

  <div class="modal" id="listModal">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle">القائمة</h2>
          <p id="modalSubtitle">تفاصيل السجلات</p>
        </div>
        <button class="close-btn" id="closeModal" type="button">×</button>
      </div>

      <div class="status-message" id="statusMessage"></div>
      <div class="list-wrap" id="listWrap"></div>
    </div>
  </div>

  <div class="modal" id="addModal">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h2>إضافة حجز مؤكد</h2>
          <p>سيتم تسجيل الحجز مباشرة بحالة محجوز.</p>
        </div>
        <button class="close-btn" id="closeAddModal" type="button">×</button>
      </div>

      <div class="status-message" id="addStatusMessage"></div>

      <div class="form-grid">
        <div>
          <label for="adminDate">التاريخ</label>
          <input type="date" id="adminDate" />
        </div>
        <div>
          <label for="adminResort">الاستراحة</label>
<select id="adminResort">
  <option value="">اختر الشاليه</option>
  <option value="شاليه رافانا A">شاليه رافانا A</option>
  <option value="شاليه رافانا B">شاليه رافانا B</option>
  <option value="شاليه رافانا C">شاليه رافانا C</option>
</select>
        </div>
        <div>
          <label for="adminBookingType">نوع الحجز</label>
          <select id="adminBookingType">
            <option value="بدون مبيت">بدون مبيت</option>
            <option value="مع مبيت">مع مبيت</option>
          </select>
        </div>
        <div>
          <label for="adminName">الاسم</label>
          <input type="text" id="adminName" placeholder="اسم العميل" />
        </div>
        <div>
          <label for="adminPhone">رقم الهاتف</label>
          <input type="tel" id="adminPhone" inputmode="numeric" pattern="[0-9]*" dir="ltr" lang="en" placeholder="96890000000" />
        </div>
        <div class="full-width">
          <label for="adminNotes">ملاحظات</label>
          <textarea id="adminNotes" placeholder="أي ملاحظات إضافية"></textarea>
        </div>
      </div>

      <div class="submit-row">
        <button class="btn-primary" id="submitAdminBooking" type="button">حفظ الحجز المؤكد</button>
        <button class="btn-secondary" id="cancelAdminBooking" type="button">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyOVAeXgIxLQycwo4uT66kQpgU6R9GzeDA9DIGGy1eel5uGbUJI4GZv3FH__TQvs7b8BA/exec';

    const statusStrip = document.getElementById('statusStrip');
    const pendingBtn = document.getElementById('pendingBtn');
    const bookedBtn = document.getElementById('bookedBtn');
    const addBookedBtn = document.getElementById('addBookedBtn');
    const pendingCount = document.getElementById('pendingCount');
    const bookedCount = document.getElementById('bookedCount');
    const listModal = document.getElementById('listModal');
    const closeModal = document.getElementById('closeModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const listWrap = document.getElementById('listWrap');
    const statusMessage = document.getElementById('statusMessage');
    const addModal = document.getElementById('addModal');
    const closeAddModal = document.getElementById('closeAddModal');
    const cancelAdminBooking = document.getElementById('cancelAdminBooking');
    const submitAdminBooking = document.getElementById('submitAdminBooking');
    const addStatusMessage = document.getElementById('addStatusMessage');
    const adminDate = document.getElementById('adminDate');
    const adminResort = document.getElementById('adminResort');
    const adminBookingType = document.getElementById('adminBookingType');
    const adminName = document.getElementById('adminName');
    const adminPhone = document.getElementById('adminPhone');
    const adminNotes = document.getElementById('adminNotes');

    let bookingData = [];
    let currentView = 'pending';
    let calendar = null;

    function normalizeDate(value) {
      if (!value) return '';
      if (typeof value === 'string') return value.trim().slice(0, 10);
      const date = new Date(value);
      if (isNaN(date.getTime())) return '';
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function normalizePhoneForWhatsApp(phone) {
      let digits = String(phone || '').replace(/[^0-9]/g, '');
      if (digits.indexOf('00') === 0) digits = digits.slice(2);
      return digits;
    }

    function getWhatsAppLink(item) {
      const phone = normalizePhoneForWhatsApp(item['الجوال']);
      if (!phone) return '';
      const name = String(item['الاسم'] || '').trim();
      const resort = String(item['الاستراحة'] || '').trim();
      const date = normalizeDate(item['التاريخ']);
      const text = encodeURIComponent('السلام عليكم ' + (name || '') + '، بخصوص طلب الحجز في ' + resort + ' بتاريخ ' + date + '.');
      return 'https://wa.me/' + phone + '?text=' + text;
    }

    function showStatus(el, message, type) {
      el.textContent = message;
      el.className = 'status-message ' + type;
    }

    function clearStatus(el) {
      el.textContent = '';
      el.className = 'status-message';
    }

function getResortShortName(resort) {
  const value = String(resort || '').trim();

  if (value === 'شاليه رافانا A') return 'A';
  if (value === 'شاليه رافانا B') return 'B';
  if (value === 'شاليه رافانا C') return 'C';

  return value;
}

    function getEventColor(status) {
      if (status === 'متاح') return '#19a765';
      if (status === 'بانتظار التأكيد') return '#f59e0b';
      return '#f05d5e';
    }

    function renderCalendar() {
      const calendarEl = document.getElementById('calendar');
      const events = bookingData.map(function(item) {
        const status = String(item['الحالة'] || '').trim();
        const resort = String(item['الاستراحة'] || '').trim();
        const date = normalizeDate(item['التاريخ']);
        return {
          title: getResortShortName(resort),
          start: date,
          allDay: true,
          backgroundColor: getEventColor(status),
          borderColor: getEventColor(status),
          textColor: '#ffffff',
          extendedProps: {
            status: status,
            resort: resort,
            date: date,
            bookingType: String(item['نوع الحجز'] || '').trim() || '-',
            name: String(item['الاسم'] || '').trim() || '-',
            phone: String(item['الجوال'] || '').trim() || '-',
            notes: String(item['ملاحظات'] || '').trim() || '-'
          }
        };
      }).filter(function(item) { return item.start; });

      if (calendar) calendar.destroy();

      calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'ar',
        direction: 'rtl',
        initialView: 'dayGridMonth',
        height: 'auto',
        headerToolbar: {
          right: 'prev,next today',
          center: 'title',
          left: ''
        },
        buttonText: { today: 'اليوم' },
        editable: false,
        selectable: false,
        events: events,
        dateClick: function() {},
        eventClick: function(info) {
          info.jsEvent.preventDefault();
          openCalendarEvent(info.event.extendedProps || {});
        }
      });

      calendar.render();
    }

    async function loadBookings() {
      try {
        statusStrip.textContent = 'جاري تحميل البيانات...';

        const res = await fetch(API_URL, { method: 'GET', cache: 'no-store' });
        const rawText = await res.text();
        let json;

        try {
          json = JSON.parse(rawText);
        } catch (e) {
          throw new Error('الرد من Apps Script ليس JSON صالحًا');
        }

        if (!json.success) throw new Error(json.message || 'تعذر تحميل البيانات');

        bookingData = Array.isArray(json.data) ? json.data : [];

        const pending = bookingData.filter(function(item) {
          return String(item['الحالة'] || '').trim() === 'بانتظار التأكيد';
        });
        const booked = bookingData.filter(function(item) {
          return String(item['الحالة'] || '').trim() === 'محجوز';
        });

        pendingCount.textContent = String(pending.length);
        bookedCount.textContent = String(booked.length);
        statusStrip.textContent = 'تم تحديث البيانات بنجاح';
        renderCalendar();

        if (listModal.classList.contains('active')) renderCurrentView();
      } catch (error) {
        console.error(error);
        statusStrip.textContent = 'تعذر تحميل البيانات';
        if (listModal.classList.contains('active')) {
          listWrap.innerHTML = '<div class="empty-state">تعذر تحميل البيانات.</div>';
        }
      }
    }

    function getItemsByView(view) {
      const filtered = bookingData.filter(function(item) {
        const status = String(item['الحالة'] || '').trim();
        return view === 'pending' ? status === 'بانتظار التأكيد' : status === 'محجوز';
      });

      return filtered.sort(function(a, b) {
        return normalizeDate(a['التاريخ']).localeCompare(normalizeDate(b['التاريخ']));
      });
    }

    function renderCurrentView() {
      clearStatus(statusMessage);
      const items = getItemsByView(currentView);

      if (currentView === 'pending') {
        modalTitle.textContent = 'طلبات حجز جديدة';
        modalSubtitle.textContent = 'قائمة الطلبات بحالة بانتظار التأكيد.';
      } else {
        modalTitle.textContent = 'الحجوزات المؤكدة';
        modalSubtitle.textContent = 'قائمة الحجوزات بحالة محجوز.';
      }

      if (!items.length) {
        listWrap.innerHTML = '<div class="empty-state">لا توجد سجلات في هذه القائمة حاليًا.</div>';
        return;
      }

      listWrap.innerHTML = items.map(function(item) {
        return renderRecordCard(item, currentView === 'pending' ? 'pending' : 'booked');
      }).join('');
    }

    function openList(view) {
      currentView = view;
      renderCurrentView();
      listModal.classList.add('active');
    }

    function closeList() {
      listModal.classList.remove('active');
      clearStatus(statusMessage);
    }

    function openAddModal(prefill) {
      clearStatus(addStatusMessage);
      adminDate.value = (prefill && prefill.date) ? prefill.date : '';
      adminResort.value = (prefill && prefill.resort) ? prefill.resort : '';
      adminBookingType.value = (prefill && prefill.bookingType && prefill.bookingType !== '-') ? prefill.bookingType : 'بدون مبيت';
      adminName.value = (prefill && prefill.name && prefill.name !== '-') ? prefill.name : '';
      adminPhone.value = (prefill && prefill.phone && prefill.phone !== '-') ? sanitizePhone(prefill.phone) : '';
      adminNotes.value = (prefill && prefill.notes && prefill.notes !== '-') ? prefill.notes : '';
      addModal.classList.add('active');
    }

    function closeAddBookingModal() {
      addModal.classList.remove('active');
      clearStatus(addStatusMessage);
    }

    function openCalendarEvent(record) {
      const status = String(record.status || '').trim();

      if (status === 'متاح') {
        openAddModal({
          date: record.date || '',
          resort: record.resort || '',
          bookingType: 'بدون مبيت',
          name: '',
          phone: '',
          notes: ''
        });
        return;
      }

      modalTitle.textContent = status === 'بانتظار التأكيد' ? 'طلب حجز بانتظار التأكيد' : 'حجز مؤكد';
      modalSubtitle.textContent = 'بيانات الحجز للتاريخ المحدد.';
      clearStatus(statusMessage);
      listWrap.innerHTML = renderRecordCard(record, status === 'بانتظار التأكيد' ? 'pending' : 'booked');
      listModal.classList.add('active');
    }

    function renderRecordCard(record, viewType) {
      const date = normalizeDate(record.date || record['التاريخ']);
      const resort = String(record.resort || record['الاستراحة'] || '').trim();
      const status = String(record.status || record['الحالة'] || '').trim();
      const bookingType = String(record.bookingType || record['نوع الحجز'] || '').trim() || '-';
      const name = String(record.name || record['الاسم'] || '').trim() || '-';
      const phone = String(record.phone || record['الجوال'] || '').trim() || '-';
      const notes = String(record.notes || record['ملاحظات'] || '').trim() || '-';
      const waLink = getWhatsAppLink({ 'الجوال': phone, 'الاسم': name, 'الاستراحة': resort, 'التاريخ': date });
      const badgeClass = viewType === 'pending' ? 'pending' : 'booked';

      let actionsHtml = '';
      if (viewType === 'pending') {
        actionsHtml += '<button class="btn-confirm" type="button" data-confirm-date="' + date + '" data-confirm-resort="' + resort + '">تأكيد الحجز</button>';
        actionsHtml += '<button class="btn-reject" type="button" data-reject-date="' + date + '" data-reject-resort="' + resort + '">رفض الحجز</button>';
      } else {
        actionsHtml += '<button class="btn-reject" type="button" data-cancel-date="' + date + '" data-cancel-resort="' + resort + '">إلغاء الحجز</button>';
      }

      if (waLink) {
        actionsHtml += '<a class="wa-link" href="' + waLink + '" target="_blank" rel="noopener noreferrer">واتساب العميل</a>';
      } else {
        actionsHtml += '<div class="wa-link" style="opacity:.75;pointer-events:none;">لا يوجد واتساب</div>';
      }

      return '' +
        '<article class="booking-card">' +
          '<div class="booking-head">' +
            '<div>' +
              '<h3>' + resort + '</h3>' +
              '<div class="booking-sub">التاريخ: ' + date + '</div>' +
            '</div>' +
            '<span class="badge ' + badgeClass + '">' + status + '</span>' +
          '</div>' +
          '<div class="booking-grid">' +
            '<div class="meta-box"><div class="meta-label">نوع الحجز</div><div class="meta-value">' + bookingType + '</div></div>' +
            '<div class="meta-box"><div class="meta-label">الاسم</div><div class="meta-value">' + name + '</div></div>' +
            '<div class="meta-box"><div class="meta-label">الجوال</div><div class="meta-value">' + phone + '</div></div>' +
            '<div class="meta-box"><div class="meta-label">الملاحظات</div><div class="meta-value">' + notes + '</div></div>' +
          '</div>' +
          '<div class="booking-actions">' + actionsHtml + '</div>' +
        '</article>';
    }

    function sanitizePhone(value) {
      const arabicIndic = '٠١٢٣٤٥٦٧٨٩';
      const easternArabicIndic = '۰۱۲۳۴۵۶۷۸۹';
      let result = String(value || '').split('').map(function(ch) {
        const idx1 = arabicIndic.indexOf(ch);
        if (idx1 > -1) return String(idx1);
        const idx2 = easternArabicIndic.indexOf(ch);
        if (idx2 > -1) return String(idx2);
        return ch;
      }).join('');
      return result.replace(/[^0-9]/g, '');
    }

    async function updateBookingStatus(date, resort, status, loadingMessage, successMessage) {
      try {
        showStatus(statusMessage, loadingMessage, 'success');

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'updateStatus', date, resort, status })
        });

        const rawText = await res.text();
        let json;
        try {
          json = JSON.parse(rawText);
        } catch (e) {
          throw new Error('تعذر قراءة رد تحديث الحالة');
        }

        if (!json.success) throw new Error(json.message || 'تعذر تحديث الحالة');

        showStatus(statusMessage, successMessage, 'success');
        await loadBookings();
        renderCurrentView();
      } catch (error) {
        console.error(error);
        showStatus(statusMessage, error.message || 'حدث خطأ أثناء تحديث الحالة', 'error');
      }
    }

    async function confirmBooking(date, resort) {
      const sure = window.confirm('هل أنت متأكد من تأكيد هذا الحجز؟');
      if (!sure) return;
      await updateBookingStatus(date, resort, 'محجوز', 'جاري تأكيد الحجز...', 'تم تأكيد الحجز بنجاح.');
    }

    async function rejectBooking(date, resort) {
      const sure = window.confirm('هل أنت متأكد من رفض هذا الحجز؟');
      if (!sure) return;
      await updateBookingStatus(date, resort, 'متاح', 'جاري رفض الحجز...', 'تم رفض الحجز وإعادة الحالة إلى متاح.');
    }

    async function cancelBooked(date, resort) {
      const sure = window.confirm('هل أنت متأكد من إلغاء هذا الحجز؟');
      if (!sure) return;
      await updateBookingStatus(date, resort, 'متاح', 'جاري إلغاء الحجز...', 'تم إلغاء الحجز وإعادة الحالة إلى متاح.');
    }

    async function createBookedByAdmin() {
      const date = adminDate.value;
      const resort = adminResort.value;
      const bookingType = adminBookingType.value;
      const name = adminName.value.trim();
      const phone = sanitizePhone(adminPhone.value.trim());
      const notes = adminNotes.value.trim();
      adminPhone.value = phone;

      if (!date || !resort || !bookingType || !name || !phone) {
        showStatus(addStatusMessage, 'يرجى تعبئة جميع الحقول المطلوبة.', 'error');
        return;
      }

      try {
        showStatus(addStatusMessage, 'جاري حفظ الحجز المؤكد...', 'success');

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'adminCreateBooked',
            date,
            resort,
            bookingType,
            name,
            phone,
            notes,
            status: 'محجوز'
          })
        });

        const rawText = await res.text();
        let json;
        try {
          json = JSON.parse(rawText);
        } catch (e) {
          throw new Error('تعذر قراءة رد إضافة الحجز');
        }

        if (!json.success) throw new Error(json.message || 'تعذر إضافة الحجز');

        showStatus(addStatusMessage, 'تمت إضافة الحجز المؤكد بنجاح.', 'success');
        await loadBookings();
        setTimeout(closeAddBookingModal, 700);
      } catch (error) {
        console.error(error);
        showStatus(addStatusMessage, error.message || 'حدث خطأ أثناء إضافة الحجز', 'error');
      }
    }

    pendingBtn.addEventListener('click', function() { openList('pending'); });
    bookedBtn.addEventListener('click', function() { openList('booked'); });
    addBookedBtn.addEventListener('click', function() { openAddModal(); });
    closeModal.addEventListener('click', closeList);
    closeAddModal.addEventListener('click', closeAddBookingModal);
    cancelAdminBooking.addEventListener('click', closeAddBookingModal);
    submitAdminBooking.addEventListener('click', createBookedByAdmin);
    adminPhone.addEventListener('input', function() {
      adminPhone.value = sanitizePhone(adminPhone.value);
    });

    listModal.addEventListener('click', function(e) {
      if (e.target === listModal) closeList();
      if (e.target.matches('[data-confirm-date][data-confirm-resort]')) {
        confirmBooking(e.target.getAttribute('data-confirm-date'), e.target.getAttribute('data-confirm-resort'));
      }
      if (e.target.matches('[data-reject-date][data-reject-resort]')) {
        rejectBooking(e.target.getAttribute('data-reject-date'), e.target.getAttribute('data-reject-resort'));
      }
      if (e.target.matches('[data-cancel-date][data-cancel-resort]')) {
        cancelBooked(e.target.getAttribute('data-cancel-date'), e.target.getAttribute('data-cancel-resort'));
      }
    });

    addModal.addEventListener('click', function(e) {
      if (e.target === addModal) closeAddBookingModal();
    });

    loadBookings();
  </script>
</body>
</html>
