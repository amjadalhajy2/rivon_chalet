<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="shortcut icon" href="./logo.png">
  <link rel="apple-touch-icon" href="./logo.png">

  <title>لوحة مدير الحجوزات - شاليهات رافانا</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/locales/ar.global.min.js" defer></script>

  <style>
    :root {
      --surface: rgba(255,255,255,0.80);
      --line: rgba(77, 58, 34, 0.10);
      --text: #2c2218;
      --muted: #76695a;
      --brand: #8b6a48;
      --brand-dark: #5f4630;
      --success: #24a46d;
      --danger: #d45454;
      --warning: #e3a12b;
      --shadow-xl: 0 24px 60px rgba(66, 43, 19, 0.10);
      --shadow-md: 0 10px 22px rgba(66, 43, 19, 0.08);
      --header-h: 78px;
      --radius-2xl: 34px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }

    body {
      font-family: "Tajawal", "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text); background: linear-gradient(rgba(250,248,244,0.78), rgba(245,242,236,0.82)), url('images/background-main.jpg') center center / cover no-repeat;
      padding-top: var(--header-h); min-height: 100vh; position: relative;
    }

    .container { width: min(1180px, calc(100% - 20px)); margin: 0 auto; }

    .topbar { position: fixed; top: 0; inset-inline: 0; z-index: 2000; width: 100%; }
    .topbar-inner {
      width: 100%; min-height: var(--header-h); display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 12px 18px; background: rgba(255,255,255,0.84); backdrop-filter: blur(18px) saturate(1.2);
      border-bottom: 1px solid rgba(255,255,255,0.7); box-shadow: var(--shadow-md);
    }
    .brand-wrap { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .logo-box { width: 56px; height: 56px; border-radius: 18px; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, #fff, #f2ebe3); box-shadow: inset 0 1px 0 rgba(255,255,255,0.75); }
    .logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .brand-title { font-size: 20px; font-weight: 800; }
    
    .menu-btn {
      width: 48px; height: 48px; padding: 0; background: linear-gradient(180deg, #fff, #f6f0e8); color: var(--text);
      display: inline-flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; border-radius: 999px; border: 0; cursor: pointer; box-shadow: 0 14px 28px rgba(95, 70, 48, 0.10);
    }
    .menu-btn span { display: block; width: 18px; height: 2px; border-radius: 999px; background: var(--text); }

    .side-menu-overlay { position: fixed; inset: 0; z-index: 2090; background: rgba(32, 23, 16, 0.22); opacity: 0; visibility: hidden; transition: .25s ease; }
    .side-menu { position: fixed; top: 0; right: 0; z-index: 2100; width: min(84vw, 320px); height: 100vh; padding: 26px 20px; background: rgba(255,255,255,0.96); transform: translateX(100%); transition: .25s ease; }
    html[dir="rtl"] .side-menu { left: 0; right: auto; transform: translateX(-100%); }
    body.menu-open .side-menu { transform: translateX(0); }
    body.menu-open .side-menu-overlay { opacity: 1; visibility: visible; }
    .side-menu-head { display: flex; justify-content: space-between; margin-bottom: 22px; padding-bottom: 12px; border-bottom: 1px solid rgba(95,70,48,0.08); }
    .side-menu-head strong { font-size: 22px; }
    .menu-close-btn { width: 40px; height: 40px; border: 0; border-radius: 50%; background: transparent; font-size: 28px; cursor: pointer; }
    .menu-link { display: block; padding: 10px 0; font-size: 17px; font-weight: 700; color: var(--text); text-decoration: none; border-bottom: 1px solid rgba(95,70,48,0.06); }

    .shell { padding: 20px 0 34px; }
    .page-title { margin: 0 0 16px; font-size: clamp(30px, 5vw, 46px); color: var(--brand-dark); }
    .action-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-bottom: 14px; }
    .action-button { min-height: 110px; padding: 18px; border: 1px solid var(--line); border-radius: var(--radius-2xl); background: linear-gradient(180deg, rgba(255,255,255,0.74), rgba(255,255,255,0.48)); box-shadow: var(--shadow-xl); backdrop-filter: blur(18px); text-align: right; cursor: pointer; transition: transform .18s ease; }
    .action-button:hover { transform: translateY(-1px); }
    .action-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; direction: ltr; }
    .action-title { font-size: 22px; font-weight: 800; color: var(--text); direction: rtl; flex: 1; }
    .count-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 56px; padding: 10px 16px; border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.64)); border: 1px solid rgba(95,70,48,0.10); font-weight: 800; font-size: 18px; }

    .status-strip { display: none; margin-bottom: 14px; padding: 12px 14px; border-radius: 18px; background: rgba(255,255,255,0.52); border: 1px solid rgba(95,70,48,0.08); font-size: 13px; }
    .status-strip.show { display: block; }
    .status-strip.error { color: #991b1b; background: rgba(212,84,84,0.10); border-color: rgba(212,84,84,0.16); }

    .card { background: linear-gradient(180deg, rgba(255,255,255,0.74), rgba(255,255,255,0.48)); border: 1px solid var(--line); border-radius: var(--radius-2xl); padding: 18px; }
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-head h2 { margin: 0; font-size: 22px; }
    .legend { display: flex; gap: 8px; margin-bottom: 12px; }
    .legend-item { display: inline-flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72)); border: 1px solid rgba(95,70,48,0.10); font-size: 12px; font-weight: 700; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.green { background: var(--success); } .dot.yellow { background: var(--warning); } .dot.red { background: var(--danger); }

    .calendar-wrap { position: relative; border-radius: 24px; background: rgba(255,255,255,0.35); border: 1px solid rgba(95,70,48,0.08); min-height: 340px; }
    #calendar { min-height: 320px; padding: 8px; }
    .calendar-loading { position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; background: rgba(248,244,238,0.90); transition: opacity .35s ease, visibility .35s ease; }
    .calendar-loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .fc { --fc-border-color: rgba(95,70,48,0.10); --fc-page-bg-color: transparent; --fc-neutral-bg-color: rgba(255,255,255,0.26); --fc-today-bg-color: rgba(236,228,216,0.74); }
    .fc .fc-toolbar-title { font-size: clamp(1.05rem, 3vw, 1.4rem); font-weight: 800; }
    .fc .fc-button { border-radius: 13px; font-weight: 700; }
    .fc-daygrid-event { border-radius: 12px; padding: 4px 6px; font-size: 11px; font-weight: 800; text-align: center; cursor: pointer; border: 0; }
    
    .modal { position: fixed; inset: 0; z-index: 3000; display: none; align-items: flex-end; justify-content: center; background: rgba(32, 23, 16, 0.22); backdrop-filter: blur(12px); }
    .modal.active { display: flex; }
    .modal-card { width: min(100%, 920px); max-height: 90vh; overflow: auto; padding: 18px 16px calc(20px + env(safe-area-inset-bottom)); border-radius: 28px 28px 0 0; background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.76)); box-shadow: 0 -20px 42px rgba(66,43,19,0.16); }
    .modal-head { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .modal-head h2 { margin: 0; font-size: 22px; }
    .modal-head p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .modal-close-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(95,70,48,0.10); background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.58)); font-size: 20px; cursor: pointer; }

    .list-wrap { display: grid; gap: 12px; }
    .booking-card { padding: 16px; border-radius: 22px; background: rgba(255,255,255,0.8); border: 1px solid rgba(95,70,48,0.08); }
    .booking-head { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .booking-head h3 { margin: 0 0 4px; font-size: 18px; }
    .badge { display: inline-flex; padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 800; }
    .badge.pending { background: rgba(227,161,43,0.14); color: #9a6700; }
    .badge.booked { background: rgba(212,84,84,0.14); color: #991b1b; }
    .booking-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
    .meta-box { padding: 12px; border-radius: 16px; background: rgba(255,255,255,0.62); }
    .meta-label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .meta-value { font-size: 14px; font-weight: 700; }

    .booking-actions { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .booking-actions button, .booking-actions a { min-height: 46px; border-radius: 14px; font-size: 13px; font-weight: 800; text-align: center; cursor: pointer; border: none; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-confirm { color: #fff; background: linear-gradient(135deg, #24a46d, #198d5c); }
    .btn-reject { color: #fff; background: linear-gradient(135deg, #d45454, #be4343); }
    .wa-link { color: #fff; background: linear-gradient(135deg, #25d366, #1ebe5d); }

    .status-message { display: none; margin-top: 12px; padding: 12px; border-radius: 14px; font-size: 13px; }
    .status-message.success { display: block; background: rgba(36,164,109,0.12); color: #166534; }
    .status-message.error { display: block; background: rgba(212,84,84,0.12); color: #991b1b; }
    .empty-state { padding: 26px 18px; text-align: center; color: var(--muted); font-size: 14px; border-radius: 20px; background: rgba(255,255,255,0.46); }

    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .full-width { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 800; }
    input, select, textarea { width: 100%; min-height: 46px; padding: 12px 13px; border-radius: 16px; border: 1px solid rgba(95,70,48,0.10); font-size: 14px; outline: none; }
    textarea { min-height: 92px; resize: vertical; }

    .submit-row { display: grid; grid-template-columns: 1.7fr 1fr; gap: 8px; margin-top: 12px; }
    .btn-primary { color: #fff; background: linear-gradient(135deg, var(--brand), var(--brand-dark)); border: none; cursor: pointer; font-weight: 800; min-height: 50px; border-radius: 16px;}
    .btn-secondary { background: #fff; border: 1px solid var(--line); cursor: pointer; font-weight: 800; border-radius: 16px;}

    @media (max-width: 600px) {
      .action-grid, .booking-grid, .booking-actions, .form-grid, .submit-row { grid-template-columns: 1fr; }
      .fc .fc-toolbar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand-wrap">
        <div class="logo-box"><img src="./logo.png" alt="شعار شاليهات رافانا" onerror="this.style.display='none'"></div>
        <div class="brand-title">شاليهات رافانا</div>
      </div>
      <div class="topbar-actions">
        <button class="menu-btn" id="menuToggle" type="button"><span></span><span></span><span></span></button>
      </div>
    </div>
  </div>

  <div class="side-menu-overlay" id="sideMenuOverlay"></div>
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu-head"><strong>التنقل</strong><button class="menu-close-btn" id="closeMenuBtn">×</button></div>
    <nav class="side-menu-links"><a class="menu-link" href="index.html">العودة للموقع الرئيسي</a></nav>
  </aside>

  <main class="container shell">
    <h1 class="page-title">لوحة مدير الحجوزات</h1>

    <section class="action-grid">
      <button class="action-button" id="pendingBtn">
        <div class="action-top"><div class="count-badge" id="pendingCount">0</div><div class="action-title">طلبات حجز جديدة</div></div>
      </button>
      <button class="action-button" id="bookedBtn">
        <div class="action-top"><div class="count-badge" id="bookedCount">0</div><div class="action-title">الحجوزات المؤكدة</div></div>
      </button>
      <button class="action-button" id="addBookedBtn">
        <div class="action-top"><div class="count-badge">+</div><div class="action-title">إضافة حجز مؤكد</div></div>
      </button>
    </section>

    <div class="status-strip" id="statusStrip"></div>

    <section class="card">
      <div class="section-head"><h2>التقويم</h2></div>
      <div class="legend">
        <span class="legend-item"><i class="dot green"></i> متاح</span>
        <span class="legend-item"><i class="dot yellow"></i> بانتظار التأكيد</span>
        <span class="legend-item"><i class="dot red"></i> محجوز</span>
      </div>
      <div class="calendar-wrap">
        <div class="calendar-loading" id="calendarLoading"><div style="font-weight: bold;">جاري تحميل التقويم...</div></div>
        <div id="calendar"></div>
      </div>
    </section>
  </main>

  <div class="modal" id="listModal">
    <div class="modal-card">
      <div class="modal-head">
        <div><h2 id="modalTitle">القائمة</h2><p id="modalSubtitle">تفاصيل السجلات</p></div>
        <button class="modal-close-btn" id="closeModal">×</button>
      </div>
      <div class="status-message" id="statusMessage"></div>
      <div class="list-wrap" id="listWrap"></div>
    </div>
  </div>

  <div class="modal" id="addModal">
    <div class="modal-card">
      <div class="modal-head">
        <div><h2>إضافة حجز مؤكد</h2><p>سيتم تسجيل الحجز مباشرة بحالة محجوز.</p></div>
        <button class="modal-close-btn" id="closeAddModal">×</button>
      </div>
      <div class="status-message" id="addStatusMessage"></div>
      <div class="form-grid">
        <div><label for="adminCheckIn">تاريخ الدخول</label><input type="date" id="adminCheckIn" /></div>
        <div><label for="adminCheckOut">تاريخ الخروج</label><input type="date" id="adminCheckOut" /></div>
        <div class="full-width"><label for="adminResort">الشاليه</label>
          <select id="adminResort">
            <option value="">اختر الشاليه</option><option value="شاليه رافانا A">شاليه رافانا A</option>
            <option value="شاليه رافانا B">شاليه رافانا B</option><option value="شاليه رافانا C">شاليه رافانا C</option>
          </select>
        </div>
        <div><label for="adminName">الاسم</label><input type="text" id="adminName" placeholder="اسم العميل" /></div>
        <div><label for="adminPhone">رقم الهاتف</label><input type="tel" id="adminPhone" placeholder="96890000000" dir="ltr" /></div>
        <div class="full-width"><label for="adminNotes">ملاحظات</label><textarea id="adminNotes"></textarea></div>
      </div>
      <div class="submit-row">
        <button class="btn-primary" id="submitAdminBooking">حفظ الحجز</button>
        <button class="btn-secondary" id="cancelAdminBooking">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ywhumxkejpnzfkvvxxvd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_08n0jwiyG7bkqATkyyL7yA_WBgELYt5';
    const SUPABASE_BOOKINGS_TABLE = 'rafana_bookings';

    function supabaseRestBase() { return SUPABASE_URL.replace(/\/$/, '') + '/rest/v1'; }
    function supabaseHeaders(extra) { return Object.assign({ apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY, Accept: 'application/json' }, extra || {}); }

    function normalizeDate(value) {
      if (!value) return '';
      if (typeof value === 'string') return value.trim().slice(0, 10);
      const d = new Date(value); if (isNaN(d.getTime())) return '';
      const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }
    function supabaseTodayIso() { return normalizeDate(new Date()); }

    function mapSupabaseBookingRow(row) {
      return {
        id: row.id || '',
        checkIn: normalizeDate(row.check_in || row.checkIn),
        checkOut: normalizeDate(row.check_out || row.checkOut),
        resort: String(row.resort || '').trim(),
        status: String(row.status || 'متاح').trim(),
        name: String(row.customer_name || row.name || '').trim(),
        phone: String(row.phone || '').trim(),
        notes: String(row.notes || '').trim()
      };
    }

    async function fetchSupabaseStoredBookings(options = {}) {
      const params = new URLSearchParams();
      params.set('select', '*');
      params.set('order', 'check_in.asc');

      // جلب الحجوزات التي تتداخل مع فترة التقويم المعروضة
      if (options.from) params.set('check_out', 'gt.' + options.from);
      if (options.to) params.append('check_in', 'lt.' + options.to);
      if (options.statuses && options.statuses.length) params.set('status', 'in.(' + options.statuses.join(',') + ')');

      const response = await fetch(supabaseRestBase() + '/' + SUPABASE_BOOKINGS_TABLE + '?' + params.toString(), {
        method: 'GET', cache: 'no-store', headers: supabaseHeaders()
      });
      const text = await response.text();
      let json = [];
      try { json = text ? JSON.parse(text) : []; } catch (e) {}
      if (!response.ok) throw new Error((json && json.message) || text || 'Error fetching');
      return Array.isArray(json) ? json : [];
    }

    async function upsertSupabaseBooking(payload) {
      const row = {
        check_in: payload.checkIn,
        check_out: payload.checkOut,
        resort: payload.resort,
        customer_name: payload.name || null,
        phone: payload.phone || null,
        notes: payload.notes || null,
        status: payload.status || 'محجوز',
        updated_at: new Date().toISOString()
      };

      const response = await fetch(supabaseRestBase() + '/' + SUPABASE_BOOKINGS_TABLE, {
        method: 'POST',
        headers: supabaseHeaders({ 'Content-Type': 'application/json', Prefer: 'return=representation' }),
        body: JSON.stringify(row)
      });
      if (!response.ok) throw new Error('فشل الحفظ');
      return await response.json();
    }

    async function deleteSupabaseBooking(id) {
      const params = new URLSearchParams({ id: 'eq.' + id });
      const response = await fetch(supabaseRestBase() + '/' + SUPABASE_BOOKINGS_TABLE + '?' + params.toString(), {
        method: 'DELETE', headers: supabaseHeaders()
      });
      if (!response.ok) throw new Error('فشل الحذف');
    }

    async function updateSupabaseBookingStatus(id, status) {
      if (status === 'متاح') {
        await deleteSupabaseBooking(id);
        return;
      }
      const params = new URLSearchParams({ id: 'eq.' + id });
      const response = await fetch(supabaseRestBase() + '/' + SUPABASE_BOOKINGS_TABLE + '?' + params.toString(), {
        method: 'PATCH',
        headers: supabaseHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ status: status, updated_at: new Date().toISOString() })
      });
      if (!response.ok) throw new Error('فشل التحديث');
    }

    const statusStrip = document.getElementById('statusStrip');
    const listModal = document.getElementById('listModal');
    const listWrap = document.getElementById('listWrap');
    const statusMessage = document.getElementById('statusMessage');

    let storedBookings = [];
    let currentCalendarData = [];
    let currentView = 'pending';
    let calendar = null;
    let currentRange = null;

    function sanitizePhone(value) { return String(value || '').replace(/[^0-9]/g, ''); }
    function getWhatsAppLink(phone, name, resort, checkIn) {
      let digits = sanitizePhone(phone); if (digits.indexOf('00') === 0) digits = digits.slice(2);
      if (!digits) return '';
      const text = encodeURIComponent('السلام عليكم ' + name + '، بخصوص طلب الحجز في ' + resort + ' لتاريخ الدخول ' + checkIn + '.');
      return 'https://wa.me/' + digits + '?text=' + text;
    }
    function showStatus(el, msg, type) { el.textContent = msg; el.className = 'status-message ' + type; }
    function clearStatus(el) { el.textContent = ''; el.className = 'status-message'; }
    function showStrip(msg, isErr=false) { statusStrip.textContent = msg; statusStrip.className = 'status-strip show' + (isErr ? ' error' : ''); }
    function hideStrip() { statusStrip.className = 'status-strip'; }

    function buildCalendarEvents() {
      return currentCalendarData.map(item => {
        let color = item.status === 'بانتظار التأكيد' ? '#e3a12b' : '#d45454';
        let shortResort = item.resort.replace('شاليه رافانا ', '');
        return {
          title: shortResort + ' - ' + (item.name || '-'),
          start: item.checkIn,
          end: item.checkOut, // FullCalendar respects exclusive end dates!
          allDay: true,
          backgroundColor: color, borderColor: color, textColor: '#fff',
          extendedProps: item
        };
      });
    }

    function renderCalendar() {
      const calendarEl = document.getElementById('calendar');
      if (calendar) calendar.destroy();

      calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'ar', direction: 'rtl', initialView: 'dayGridMonth', height: 'auto',
        headerToolbar: { right: 'prev,next today', center: 'title', left: '' },
        buttonText: { today: 'اليوم' },
        events: buildCalendarEvents(),
        datesSet(info) {
          const start = normalizeDate(info.start);
          const end = normalizeDate(info.end); // We fetch based on the visible view
          loadCalendarRange(start, end);
        },
        eventClick(info) {
          info.jsEvent.preventDefault();
          openCalendarEvent(info.event.extendedProps);
        }
      });
      calendar.render();
    }

    async function loadStoredBookings() {
      const rows = await fetchSupabaseStoredBookings({ from: supabaseTodayIso(), statuses: ['بانتظار التأكيد', 'محجوز'] });
      storedBookings = rows.map(mapSupabaseBookingRow);
      document.getElementById('pendingCount').textContent = storedBookings.filter(b => b.status === 'بانتظار التأكيد').length;
      document.getElementById('bookedCount').textContent = storedBookings.filter(b => b.status === 'محجوز').length;
    }

    async function loadCalendarRange(start, end) {
      currentRange = { start, end };
      document.getElementById('calendarLoading').classList.remove('hidden');
      try {
        const rows = await fetchSupabaseStoredBookings({ from: start, to: end });
        currentCalendarData = rows.map(mapSupabaseBookingRow);
        if (calendar) { calendar.removeAllEvents(); calendar.addEventSource(buildCalendarEvents()); }
      } catch (e) { showStrip('تعذر تحميل التقويم.', true); }
      document.getElementById('calendarLoading').classList.add('hidden');
    }

    async function loadBookings() {
      showStrip('جاري التحميل...');
      await loadStoredBookings();
      hideStrip();
      if (listModal.classList.contains('active')) renderCurrentView();
      if (!calendar) renderCalendar(); else await loadCalendarRange(currentRange.start, currentRange.end);
    }

    function renderCurrentView() {
      clearStatus(statusMessage);
      const items = storedBookings.filter(b => b.status === (currentView === 'pending' ? 'بانتظار التأكيد' : 'محجوز'));
      document.getElementById('modalTitle').textContent = currentView === 'pending' ? 'طلبات حجز جديدة' : 'الحجوزات المؤكدة';
      if (!items.length) { listWrap.innerHTML = '<div class="empty-state">لا يوجد سجلات.</div>'; return; }
      listWrap.innerHTML = items.map(item => renderRecordCard(item, currentView)).join('');
    }

    function renderRecordCard(record, viewType) {
      const waLink = getWhatsAppLink(record.phone, record.name, record.resort, record.checkIn);
      const badgeClass = viewType === 'pending' ? 'pending' : 'booked';
      let actions = '';
      if (viewType === 'pending') {
        actions += `<button class="btn-confirm action-btn" data-action="confirm" data-id="${record.id}">تأكيد</button>`;
        actions += `<button class="btn-reject action-btn" data-action="reject" data-id="${record.id}">رفض</button>`;
      } else {
        actions += `<button class="btn-reject action-btn" data-action="cancel" data-id="${record.id}">إلغاء</button>`;
      }
      actions += waLink ? `<a class="wa-link" href="${waLink}" target="_blank">واتساب</a>` : ``;

      return `
        <article class="booking-card">
          <div class="booking-head">
            <div><h3>${record.resort}</h3><div style="color:var(--muted);font-size:13px;">من ${record.checkIn} إلى ${record.checkOut}</div></div>
            <span class="badge ${badgeClass}">${record.status}</span>
          </div>
          <div class="booking-grid">
            <div class="meta-box"><div class="meta-label">الاسم</div><div class="meta-value">${record.name}</div></div>
            <div class="meta-box"><div class="meta-label">الجوال</div><div class="meta-value">${record.phone}</div></div>
            <div class="meta-box"><div class="meta-label">ملاحظات</div><div class="meta-value">${record.notes || '-'}</div></div>
          </div>
          <div class="booking-actions">${actions}</div>
        </article>`;
    }

    async function handleBookingAction(id, newStatus, loadingMsg, successMsg) {
      if (!confirm('هل أنت متأكد؟')) return;
      try {
        showStatus(statusMessage, loadingMsg, 'success');
        await updateSupabaseBookingStatus(id, newStatus);
        showStatus(statusMessage, successMsg, 'success');
        await loadBookings();
      } catch (e) { showStatus(statusMessage, 'خطأ في التحديث', 'error'); }
    }

    document.getElementById('listWrap').addEventListener('click', e => {
      const btn = e.target.closest('.action-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      if (btn.dataset.action === 'confirm') handleBookingAction(id, 'محجوز', 'جاري التأكيد...', 'تم التأكيد.');
      if (btn.dataset.action === 'reject') handleBookingAction(id, 'متاح', 'جاري الرفض...', 'تم الرفض بنجاح.');
      if (btn.dataset.action === 'cancel') handleBookingAction(id, 'متاح', 'جاري الإلغاء...', 'تم الإلغاء بنجاح.');
    });

    document.getElementById('pendingBtn').onclick = () => { currentView = 'pending'; renderCurrentView(); listModal.classList.add('active'); };
    document.getElementById('bookedBtn').onclick = () => { currentView = 'booked'; renderCurrentView(); listModal.classList.add('active'); };
    document.getElementById('closeModal').onclick = () => { listModal.classList.remove('active'); clearStatus(statusMessage); };
    
    function openCalendarEvent(record) {
      currentView = record.status === 'بانتظار التأكيد' ? 'pending' : 'booked';
      document.getElementById('modalTitle').textContent = 'تفاصيل الحجز';
      clearStatus(statusMessage);
      listWrap.innerHTML = renderRecordCard(record, currentView);
      listModal.classList.add('active');
    }

    document.getElementById('addBookedBtn').onclick = () => {
      document.getElementById('adminCheckIn').value = ''; document.getElementById('adminCheckOut').value = '';
      document.getElementById('adminResort').value = ''; document.getElementById('adminName').value = '';
      document.getElementById('adminPhone').value = ''; document.getElementById('adminNotes').value = '';
      document.getElementById('addModal').classList.add('active');
    };
    document.getElementById('closeAddModal').onclick = document.getElementById('cancelAdminBooking').onclick = () => { document.getElementById('addModal').classList.remove('active'); clearStatus(document.getElementById('addStatusMessage')); };

    document.getElementById('submitAdminBooking').onclick = async () => {
      const payload = {
        checkIn: document.getElementById('adminCheckIn').value, checkOut: document.getElementById('adminCheckOut').value,
        resort: document.getElementById('adminResort').value, name: document.getElementById('adminName').value.trim(),
        phone: sanitizePhone(document.getElementById('adminPhone').value.trim()), notes: document.getElementById('adminNotes').value.trim(), status: 'محجوز'
      };
      if (!payload.checkIn || !payload.checkOut || !payload.resort || !payload.name) { showStatus(document.getElementById('addStatusMessage'), 'يرجى تعبئة الحقول الأساسية.', 'error'); return; }
      
      try {
        showStatus(document.getElementById('addStatusMessage'), 'جاري الحفظ...', 'success');
        await upsertSupabaseBooking(payload);
        showStatus(document.getElementById('addStatusMessage'), 'تم الحفظ بنجاح.', 'success');
        await loadBookings();
        setTimeout(() => document.getElementById('closeAddModal').click(), 700);
      } catch (e) { showStatus(document.getElementById('addStatusMessage'), 'حدث خطأ.', 'error'); }
    };

    document.getElementById('menuToggle').onclick = () => document.body.classList.add('menu-open');
    document.getElementById('closeMenuBtn').onclick = document.getElementById('sideMenuOverlay').onclick = () => document.body.classList.remove('menu-open');

    loadBookings();
  </script>
</body>
</html>
